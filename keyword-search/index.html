<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyword Search</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f4;
        --color-background-warning: #faeeda;
        --color-text-primary: #1a1a18;
        --color-text-secondary: #5f5e5a;
        --color-text-tertiary: #888780;
        --color-text-info: #185fa5;
        --color-text-warning: #854f0b;
        --color-border-tertiary: rgba(0,0,0,0.12);
        --color-border-secondary: rgba(0,0,0,0.22);
        --font-sans: system-ui, -apple-system, sans-serif;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1c1c1a;
          --color-background-secondary: #2a2a28;
          --color-background-warning: #412402;
          --color-text-primary: #f0ede8;
          --color-text-secondary: #b4b2a9;
          --color-text-tertiary: #888780;
          --color-text-info: #85b7eb;
          --color-text-warning: #fac775;
          --color-border-tertiary: rgba(255,255,255,0.1);
          --color-border-secondary: rgba(255,255,255,0.2);
        }
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        min-height: 100vh;
      }
      input, select, button {
        font-family: inherit;
        font-size: 14px;
        color: var(--color-text-primary);
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 8px 12px;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus { border-color: var(--color-text-info); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
      button { cursor: pointer; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button:hover:not(:disabled) { background: var(--color-background-secondary); }
      .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
      mark { background: var(--color-background-warning); color: var(--color-text-warning); border-radius: 2px; padding: 0 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
